<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manim Animation Gallery</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1e1e1e;
      --surface-hover: #2a2a2a;
      --text: #e0e0e0;
      --accent: #58a6ff;
      --accent-dark: #1f6feb;
      --danger: #f85149;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Video player section */
    .player-section {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
      overflow: hidden;
      display: none; /* Hidden until a video is selected */
    }

    .player-section.active {
      display: block;
    }

    .release-title {
      padding: 1rem 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      background: rgba(88, 166, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    video {
      display: block;
      width: 100%;
      max-height: 70vh;
      background: #000;
      outline: none;
    }

    /* Grid of release cards */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      border: 1px solid transparent;
    }

    .card:hover {
      background: var(--surface-hover);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      border-color: var(--accent);
    }

    .card-name {
      font-size: 1.3rem;
      font-weight: 600;
      word-break: break-word;
    }

    .card-meta {
      font-size: 0.85rem;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .play-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.2rem;
      transition: background 0.2s;
    }

    .card:hover .play-icon {
      background: var(--accent-dark);
    }

    .empty-state {
      text-align: center;
      grid-column: 1 / -1;
      padding: 3rem;
      color: #777;
      font-size: 1.2rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .error {
      text-align: center;
      padding: 2rem;
      color: var(--danger);
      background: rgba(248, 81, 73, 0.1);
      border-radius: var(--radius);
      margin: 1rem 0;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      .release-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Manim Animation Gallery</h1>

    <!-- Video player (visible when a release is selected) -->
    <div id="playerSection" class="player-section">
      <div id="playerReleaseName" class="release-title"></div>
      <video id="videoPlayer" controls autoplay></video>
    </div>

    <!-- Gallery of releases -->
    <div id="gallery" class="gallery">
      <div class="loading">Loading releases…</div>
    </div>
  </div>

  <script>
    // ============================================
    // 🔧 CONFIGURATION - CHANGE THESE TWO VALUES
    // ============================================
    const REPO_OWNER = 'eartinityop';      // e.g., 'myusername'
    const REPO_NAME = 'Manim-builder';             // e.g., 'my-manim-project'

    // Optional: Provide a GitHub personal access token to avoid rate limits
    // (only needed if your repo is private or you hit the unauthenticated limit)
    const GITHUB_TOKEN = '';  // or 'ghp_xxxx' – never expose in public pages!

    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
    const headers = { Accept: 'application/vnd.github.v3+json' };
    if (GITHUB_TOKEN) {
      headers.Authorization = `token ${GITHUB_TOKEN}`;
    }

    const playerSection = document.getElementById('playerSection');
    const playerReleaseName = document.getElementById('playerReleaseName');
    const videoPlayer = document.getElementById('videoPlayer');
    const galleryDiv = document.getElementById('gallery');

    async function fetchReleases() {
      try {
        // Fetch releases (latest first)
        const resp = await fetch(`${API_BASE}/releases?per_page=100`, { headers });
        if (!resp.ok) {
          throw new Error(`GitHub API error: ${resp.status} ${resp.statusText}`);
        }
        const releases = await resp.json();

        if (!Array.isArray(releases) || releases.length === 0) {
          galleryDiv.innerHTML = '<div class="empty-state">No releases found.</div>';
          return;
        }

        const releasesWithMp4 = [];

        // Check assets for .mp4 files
        for (const release of releases) {
          const assetsResp = await fetch(release.assets_url, { headers });
          if (!assetsResp.ok) continue;
          const assets = await assetsResp.json();
          const mp4 = assets.find(asset => asset.name.toLowerCase().endsWith('.mp4'));
          if (mp4) {
            releasesWithMp4.push({
              name: release.name || release.tag_name,
              tag: release.tag_name,
              published: new Date(release.published_at).toLocaleDateString(),
              downloadUrl: mp4.browser_download_url
            });
          }
        }

        if (releasesWithMp4.length === 0) {
          galleryDiv.innerHTML = '<div class="empty-state">No releases with .mp4 files yet.<br>Trigger your workflow to create one!</div>';
          return;
        }

        renderGallery(releasesWithMp4);
      } catch (err) {
        console.error(err);
        galleryDiv.innerHTML = `<div class="error">⚠️ ${err.message}</div>`;
      }
    }

    function renderGallery(releases) {
      galleryDiv.innerHTML = '';

      releases.forEach(release => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-name">${escapeHtml(release.name)}</div>
          <div class="card-meta">
            <span>${release.published}</span>
            <span class="play-icon">▶</span>
          </div>
        `;
        card.addEventListener('click', () => playRelease(release));
        galleryDiv.appendChild(card);
      });
    }

    function playRelease(release) {
      playerReleaseName.textContent = release.name;
      videoPlayer.src = release.downloadUrl;
      videoPlayer.load();
      playerSection.classList.add('active');
      // Scroll to the player
      playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Kick off
    fetchReleases();
  </script>
</body>
</html>
