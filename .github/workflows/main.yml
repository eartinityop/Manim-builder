name: Render Manim Animation

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Path to the Manim script (e.g. scenes/my_scene.py)'
        required: true
        type: string
        default: 'scenes/my_animation.py'

      scene:
        description: 'Scene class name (leave empty to auto-detect)'
        required: false
        type: string
        default: ''

      release_name:
        description: 'Release name (display name)'
        required: true
        type: string

      # ✨ New input for Instagram reel (9:16 portrait)
      instagram_reel:
        description: 'Render as Instagram Reel (9:16 portrait)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  render-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-detect scene if not provided
        id: detect
        if: ${{ github.event.inputs.scene == '' }}
        run: |
          SCRIPT="${{ github.event.inputs.script }}"
          if [ ! -f "$SCRIPT" ]; then
            echo "::error::Script file not found: $SCRIPT"
            exit 1
          fi
          SCENE=$(grep -oP 'class\s+(\w+)\s*\(.*Scene.*\)' "$SCRIPT" | head -1 | sed -E 's/class\s+(\w+)\s*\(.*/\1/')
          if [ -z "$SCENE" ]; then
            echo "::error::Could not auto-detect a Scene class in $SCRIPT"
            exit 1
          fi
          echo "Detected scene: $SCENE"
          echo "scene=$SCENE" >> $GITHUB_OUTPUT

      - name: Set scene name
        id: scene_name
        run: |
          if [ -n "${{ github.event.inputs.scene }}" ]; then
            echo "scene=${{ github.event.inputs.scene }}" >> $GITHUB_OUTPUT
          else
            echo "scene=${{ steps.detect.outputs.scene }}" >> $GITHUB_OUTPUT
          fi

      - name: Render animation with Docker
        run: |
          SCRIPT="${{ github.event.inputs.script }}"
          SCENE="${{ steps.scene_name.outputs.scene }}"

          # If Instagram Reel is enabled, inject portrait resolution config
          if [ "${{ github.event.inputs.instagram_reel }}" == "true" ]; then
            TEMP_SCRIPT="_manim_temp.py"
            echo "from manim import config; config.frame_size = (700,1000); config.frame_width = 15" > "$TEMP_SCRIPT"
            cat "$SCRIPT" >> "$TEMP_SCRIPT"
            SCRIPT="$TEMP_SCRIPT"
            echo "Instagram Reel mode: 9:16 portrait resolution applied."
          fi

          echo "Rendering scene '$SCENE' from '$SCRIPT' at 1080p 60fps"

          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/manim" \
            manimcommunity/manim:stable \
            manim -qh --fps 60 -o "/manim/rendered.mp4" "/manim/${SCRIPT}" "$SCENE"

          # Clean up temporary script if it was created
          [ -f "_manim_temp.py" ] && rm -f "_manim_temp.py"

          if [ ! -f rendered.mp4 ]; then
            echo "::error::Rendering failed – rendered.mp4 not found"
            exit 1
          fi
          echo "Rendering complete. File: rendered.mp4"

      - name: Upload video to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manim-${{ github.run_id }}-${{ github.run_attempt }}
          name: ${{ github.event.inputs.release_name }}
          files: rendered.mp4
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
